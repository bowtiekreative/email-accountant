name: build-images

# Builds + deploys to Hostinger Docker Manager

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - "db/**"
      - "pipeline/**"
      - "reconciliation/**"
      - "accounts.py"
      - "scan_*.py"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: webapp/backend/Dockerfile
          - name: frontend
            dockerfile: webapp/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/email-accountant-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: email-accountant
          docker-compose-path: docker-compose.hostinger.yml
          environment-variables: |
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            ANON_KEY=${{ secrets.ANON_KEY }}
            SERVICE_ROLE_KEY=${{ secrets.SERVICE_ROLE_KEY }}
            API_EXTERNAL_URL=https://srv620544.hstgr.cloud:8000
            SUPABASE_PUBLIC_URL=https://srv620544.hstgr.cloud:8000
            SITE_URL=https://srv620544.hstgr.cloud:3000
            WEBAPP_ORIGIN=https://srv620544.hstgr.cloud:3000
            BACKEND_DOMAIN=backend-email-acccount.srv620544.hstgr.cloud
            FRONTEND_DOMAIN=email-acccountant.srv620544.hstgr.cloud
            BACKEND_PORT=38081
            FRONTEND_PORT=38080
            KONG_HTTP_PORT=38000
            POSTGRES_PORT=35432
