name: build-images

# Builds Docker images on push to main → GHCR. Watchtower on the VPS
# auto-picks up new `latest` tags and restarts containers.

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - "db/**"
      - "pipeline/**"
      - "reconciliation/**"
      - "accounts.py"
      - "scan_*.py"
      - "docker-compose.cloud.yml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: webapp/backend/Dockerfile
          - name: frontend
            dockerfile: webapp/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/email-accountant-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://spssdhtcobnrascgnlct.supabase.co
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_YtEXw_BCzN7LeLDpCk0dHw_Z9fQSPl9
            BACKEND_INTERNAL_URL=http://backend:8000