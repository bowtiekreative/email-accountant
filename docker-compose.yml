# Whole-project stack for the VPS — one `docker compose up -d`.
#
#   cp .env.example .env        # fill in secrets (see README + supabase/README.md)
#   docker compose up -d --build
#
# Brings up:
#   Supabase  → http://<host>:8000   (Studio admin UI + REST/Auth/Storage API)
#   Dashboard → http://<host>:3000   (Next.js)
#   API       → http://<host>:8001   (FastAPI)
#   Postgres  → <host>:5432
#
# The Supabase services live in supabase/docker-compose.yml and are pulled in
# via `include`, so there's a single source of truth.

name: email-accountant

include:
  - supabase/docker-compose.yml

services:
  # ── Dashboard API (FastAPI) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: webapp/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Ledger (SQLite) volume — the scanner writes here, the API reads it.
      EMAIL_ACCOUNTANT_DB_DIR: /data
      EMAIL_ACCOUNTANT_HOME: /config
      EMAIL_ACCOUNTANT_FRONTEND_ORIGIN: ${WEBAPP_ORIGIN:-http://localhost:3000}
      # Wired for Supabase/Postgres (used once the data layer points at it).
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL:-http://kong:8000}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ${LEDGER_DIR:-./stack-data/ledger}:/data
      - ${CONFIG_DIR:-./stack-data/config}:/config
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  # ── Dashboard (Next.js) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: webapp/frontend/Dockerfile
      # Empty NEXT_PUBLIC_API_BASE = same-origin: the browser calls /api/* on the
      # frontend and the Next server proxies to the backend at runtime, so no
      # VPS IP is baked in.
    restart: unless-stopped
    depends_on: [backend]
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # ── Scanner (optional) ─ run with: docker compose --profile scanner up -d
  scanner:
    build:
      context: .
      dockerfile: webapp/backend/Dockerfile
    restart: unless-stopped
    profiles: ["scanner"]
    depends_on: [backend]
    environment:
      EMAIL_ACCOUNTANT_DB_DIR: /data
      EMAIL_ACCOUNTANT_HOME: /config
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-21600}
    volumes:
      - ${LEDGER_DIR:-./stack-data/ledger}:/data
      - ${CONFIG_DIR:-./stack-data/config}:/config
    working_dir: /app
    # Periodic incremental scan loop (configure Gmail creds in Accounts/.env).
    command: >
      sh -c 'while true; do python scan_daily.py || true;
             sleep "${SCAN_INTERVAL_SECONDS:-21600}"; done'
